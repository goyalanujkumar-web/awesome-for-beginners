      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: add exercises for JS, HTML, CSS and placeholders for Java/C++"
          title: "Add exercises for JavaScript, HTML, CSS, Java, and C++"
          body: |
            Adds per-language exercise indexes and starter files:
            - exercises/javascript/* (index + JS buggy starter files)
            - exercises/html/* (index + buggy HTML files)
            - exercises/css/* (index + buggy CSS files)
            - exercises/java/* (index + placeholders)
            - exercises/cpp/* (index + placeholders)
          base: main
          branch: add-exercises-for-languages
          labels: "exercises, automated"
