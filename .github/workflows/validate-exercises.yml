name: Validate Exercise Submissions

on:
  pull_request:
    types: [opened, synchronize, reopened]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  pull-requests: write
  issues: write
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Setup environments
        run: |
          sudo apt-get update
          sudo apt-get install -y g++

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Run validation
        id: validate
        continue-on-error: true
        run: |
          VALIDATION_FAILED=0
          
          # Validate HTML files
          echo "=== Validating HTML ==="
          for file in $(find exercises/html -name "*.html" -type f 2>/dev/null); do
            echo "Checking $file..."
            if ! grep -q "<!DOCTYPE" "$file" 2>/dev/null; then
              echo "❌ Missing DOCTYPE in $file"
              VALIDATION_FAILED=1
            fi
            if ! grep -q "</html>" "$file" 2>/dev/null; then
              echo "❌ Missing closing </html> tag in $file"
              VALIDATION_FAILED=1
            fi
          done
          
          # Validate CSS files
          echo "=== Validating CSS ==="
          for file in $(find exercises/css -name "*.css" -type f 2>/dev/null); do
            echo "Checking $file..."
            if grep -q "colour:" "$file" 2>/dev/null; then
              echo "❌ Found typo 'colour:' in $file (should be 'color:')"
              VALIDATION_FAILED=1
            fi
          done
          
          # Validate JavaScript files
          echo "=== Validating JavaScript ==="
          for file in $(find exercises/javascript -name "*.js" -type f 2>/dev/null); do
            echo "Checking $file..."
            if ! node -c "$file" 2>/dev/null; then
              echo "❌ Syntax error in $file"
              VALIDATION_FAILED=1
            fi
          done
          
          # Validate Java files
          echo "=== Validating Java ==="
          for file in $(find exercises/java -name "*.java" -type f 2>/dev/null); do
            echo "Checking $file..."
            if grep -q "TODO" "$file" 2>/dev/null; then
              echo "❌ Found TODO comment in $file (incomplete)"
              VALIDATION_FAILED=1
            fi
          done
          
          # Validate C++ files
          echo "=== Validating C++ ==="
          for file in $(find exercises/cpp -name "*.cpp" -type f 2>/dev/null); do
            echo "Checking $file..."
            if grep -q "TODO" "$file" 2>/dev/null; then
              echo "❌ Found TODO comment in $file (incomplete)"
              VALIDATION_FAILED=1
            fi
          done
          
          if [ $VALIDATION_FAILED -eq 0 ]; then
            echo "VALIDATION_RESULT=PASS" >> $GITHUB_OUTPUT
            echo "✅ All validations passed!"
          else
            echo "VALIDATION_RESULT=FAIL" >> $GITHUB_OUTPUT
            echo "❌ Validation failed!"
          fi

      - name: Add reaction - Success
        if: steps.validate.outputs.VALIDATION_RESULT == 'PASS'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const pr_number = context.issue.number;
            
            console.log(`PR: ${owner}/${repo}#${pr_number}`);
            console.log(`Validation: PASS`);
            
            // Create comment
            await github.rest.issues.createComment({
              owner: owner,
              repo: repo,
              issue_number: pr_number,
              body: '✅ **Excellent Work!** All exercises validated successfully! Closing this PR.'
            });
            
            // Close PR
            await github.rest.pulls.update({
              owner: owner,
              repo: repo,
              pull_number: pr_number,
              state: 'closed'
            });

      - name: Add reaction - Failure
        if: steps.validate.outputs.VALIDATION_RESULT == 'FAIL'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const pr_number = context.issue.number;
            
            console.log(`PR: ${owner}/${repo}#${pr_number}`);
            console.log(`Validation: FAIL`);
            
            await github.rest.issues.createComment({
              owner: owner,
              repo: repo,
              issue_number: pr_number,
              body: '❌ **Validation Failed**\n\nPlease fix the errors and push again. The workflow will automatically re-validate.\n\n**Tips:**\n- HTML: Check for DOCTYPE and closing tags\n- CSS: Fix typos (colour → color)\n- JavaScript: Check syntax\n- Java/C++: Remove TODO comments'
            });
