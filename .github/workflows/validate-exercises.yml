name: Validate Exercise Submissions

on:
  pull_request:
    types: [opened, synchronize, reopened]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Get changed files
        id: changed_files
        run: |
          git fetch origin ${{ github.base_ref }}
          CHANGED_FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)
          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGED_FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Setup environments
        run: |
          sudo apt-get update
          sudo apt-get install -y g++
          npm install -g htmlhint stylelint stylelint-config-standard

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Run validation tests
        id: validate
        run: |
          VALIDATION_FAILED=0
          
          CHANGED_FILES="${{ steps.changed_files.outputs.files }}"
          
          echo "=== Validating Changed Files ==="
          
          while IFS= read -r file; do
            if [ -z "$file" ] || [ ! -f "$file" ]; then
              continue
            fi
            
            echo ""
            echo "Checking: $file"
            
            # HTML validation with logic checks
            if [[ $file == *.html ]]; then
              if ! htmlhint "$file" 2>&1 | grep -q "0 error"; then
                echo "❌ HTML syntax error"
                VALIDATION_FAILED=1
              fi
              
              # Run logic tests
              TEST_RESULT=$(node -e "
                const test = require('./.github/test-exercises/test-html.js');
                const checks = test('$file');
                const failed = Object.entries(checks).filter(([k,v]) => !v);
                if (failed.length > 0) {
                  failed.forEach(([k,v]) => console.log('❌ Failed: ' + k));
                  process.exit(1);
                }
              " 2>&1)
              
              if [ $? -ne 0 ]; then
                echo "❌ HTML logic check failed:"
                echo "$TEST_RESULT"
                VALIDATION_FAILED=1
              else
                echo "✅ HTML passed all checks"
              fi
            fi
            
            # CSS validation
            if [[ $file == *.css ]]; then
              if ! npx stylelint "$file" 2>&1 | grep -q "0 problem"; then
                echo "❌ CSS syntax error"
                VALIDATION_FAILED=1
              fi
              
              # Run logic tests
              TEST_RESULT=$(node -e "
                const test = require('./.github/test-exercises/test-css.js');
                const checks = test('$file');
                const failed = Object.entries(checks).filter(([k,v]) => !v);
                if (failed.length > 0) {
                  failed.forEach(([k,v]) => console.log('❌ Failed: ' + k));
                  process.exit(1);
                }
              " 2>&1)
              
              if [ $? -ne 0 ]; then
                echo "❌ CSS logic check failed:"
                echo "$TEST_RESULT"
                VALIDATION_FAILED=1
              else
                echo "✅ CSS passed all checks"
              fi
            fi
            
            # JavaScript validation
            if [[ $file == *.js ]]; then
              if ! node -c "$file" 2>/dev/null; then
                echo "❌ JavaScript syntax error"
                VALIDATION_FAILED=1
              fi
              
              # Run logic tests
              TEST_RESULT=$(node -e "
                const test = require('./.github/test-exercises/test-javascript.js');
                const checks = test('$file');
                const failed = Object.entries(checks).filter(([k,v]) => !v);
                if (failed.length > 0) {
                  failed.forEach(([k,v]) => console.log('❌ Failed: ' + k));
                  process.exit(1);
                }
              " 2>&1)
              
              if [ $? -ne 0 ]; then
                echo "❌ JavaScript logic check failed:"
                echo "$TEST_RESULT"
                VALIDATION_FAILED=1
              else
                echo "✅ JavaScript passed all checks"
              fi
            fi
            
          done <<< "$CHANGED_FILES"
          
          echo ""
          if [ $VALIDATION_FAILED -eq 0 ]; then
            echo "✅ ALL VALIDATIONS PASSED"
            echo "VALIDATION_RESULT=PASS" >> $GITHUB_OUTPUT
            exit 0
          else
            echo "❌ VALIDATION FAILED"
            echo "VALIDATION_RESULT=FAIL" >> $GITHUB_OUTPUT
            exit 1
          fi
