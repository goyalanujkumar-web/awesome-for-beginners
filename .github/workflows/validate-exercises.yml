name: Validate Exercise Submissions

on:
  pull_request:
    types: [opened, synchronize, reopened]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Setup environments
        run: |
          sudo apt-get update
          sudo apt-get install -y g++

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Run validation
        id: validate
        run: |
          VALIDATION_FAILED=0
          
          # Validate HTML files
          echo "=== Validating HTML ==="
          for file in $(find exercises/html -name "*.html" -type f 2>/dev/null); do
            echo "Checking $file..."
            if ! grep -q "<!DOCTYPE" "$file" 2>/dev/null; then
              echo "❌ Missing DOCTYPE in $file"
              VALIDATION_FAILED=1
            fi
            if ! grep -q "</html>" "$file" 2>/dev/null; then
              echo "❌ Missing closing </html> tag in $file"
              VALIDATION_FAILED=1
            fi
          done
          
          # Validate CSS files
          echo "=== Validating CSS ==="
          for file in $(find exercises/css -name "*.css" -type f 2>/dev/null); do
            echo "Checking $file..."
            if grep -q "colour:" "$file" 2>/dev/null; then
              echo "❌ Found typo 'colour:' in $file (should be 'color:')"
              VALIDATION_FAILED=1
            fi
          done
          
          # Validate JavaScript files
          echo "=== Validating JavaScript ==="
          for file in $(find exercises/javascript -name "*.js" -type f 2>/dev/null); do
            echo "Checking $file..."
            if ! node -c "$file" 2>/dev/null; then
              echo "❌ Syntax error in $file"
              VALIDATION_FAILED=1
            fi
          done
          
          # Validate Java files
          echo "=== Validating Java ==="
          for file in $(find exercises/java -name "*.java" -type f 2>/dev/null); do
            echo "Checking $file..."
            if grep -q "TODO" "$file" 2>/dev/null; then
              echo "❌ Found TODO comment in $file (incomplete)"
              VALIDATION_FAILED=1
            fi
          done
          
          # Validate C++ files
          echo "=== Validating C++ ==="
          for file in $(find exercises/cpp -name "*.cpp" -type f 2>/dev/null); do
            echo "Checking $file..."
            if grep -q "TODO" "$file" 2>/dev/null; then
              echo "❌ Found TODO comment in $file (incomplete)"
              VALIDATION_FAILED=1
            fi
          done
          
          if [ $VALIDATION_FAILED -eq 0 ]; then
            echo "VALIDATION_RESULT=PASS" >> $GITHUB_OUTPUT
            echo "✅ All validations passed!"
            exit 0
          else
            echo "VALIDATION_RESULT=FAIL" >> $GITHUB_OUTPUT
            echo "❌ Validation failed!"
            exit 1
          fi

      - name: Report Results
        if: always()
        run: |
          echo "Validation Result: ${{ steps.validate.outputs.VALIDATION_RESULT }}"
          if [ "${{ steps.validate.outputs.VALIDATION_RESULT }}" = "PASS" ]; then
            echo "✅ SUCCESS - PR will be accepted"
            exit 0
          else
            echo "❌ FAILURE - PR needs fixes"
            exit 1
          fi
